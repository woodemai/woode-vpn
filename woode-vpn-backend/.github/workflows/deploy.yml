name: CI/CD VPS Deploy

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository }}-app
  IMAGE_BOT: ghcr.io/${{ github.repository }}-bot

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================
      # BUILD BACKEND
      # =====================
      - name: Build backend image
        run: |
          docker build \
            -t $IMAGE_APP:latest \
            -f woode-vpn-backend/Dockerfile \
            woode-vpn-backend

      - name: Push backend
        run: docker push $IMAGE_APP:latest

      # =====================
      # BUILD BOT
      # =====================
      - name: Build bot image
        run: |
          docker build \
            -t $IMAGE_BOT:latest \
            -f woode-vpn-telegram-bot/Dockerfile \
            woode-vpn-telegram-bot

      - name: Push bot
        run: docker push $IMAGE_BOT:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/woode-vpn

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting stack..."
            docker compose up -d --remove-orphans

            echo "Cleanup..."
            docker image prune -f